# Fly.io app config for the GRINDSET game server.
# Deploy: fly launch --copy-config --config infra/fly/server.fly.toml --no-deploy
# Then:    fly deploy --config infra/fly/server.fly.toml --dockerfile apps/server/Dockerfile

app = "grindset-server"
primary_region = "lhr"

[build]
  dockerfile = "../../apps/server/Dockerfile"

[env]
  HTTP_ADDR = ":8080"
  TICK_MS = "400"

# DATABASE_URL, REDIS_URL, NATS_URL, JWT_SECRET set via:
#   fly secrets set DATABASE_URL=... -a grindset-server

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"   # game server should stay warm
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "30s"
    method = "get"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
